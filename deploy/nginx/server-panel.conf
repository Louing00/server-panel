# Replace server_name with your domain, then copy to:
#   /etc/nginx/sites-available/server-panel.conf
#
# Enable it with:
#   ln -s /etc/nginx/sites-available/server-panel.conf /etc/nginx/sites-enabled/server-panel.conf
#   nginx -t && systemctl reload nginx

server {
  listen 80;
  server_name example.com;

  client_max_body_size 200m;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support for /ws/ssh.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
